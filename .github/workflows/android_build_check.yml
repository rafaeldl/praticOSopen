name: Android Build Check

on:
  pull_request:
    branches: [ master ]
    paths:
      - 'android/**'
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or commit SHA to run against'
        required: false
        default: 'master'

# Cancel previous runs for the same PR
concurrency:
  group: android-build-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: stable
          cache: true

      - name: Flutter deps
        run: flutter pub get

      # Setup Ruby + Bundler (caso necessário para algum script, mantendo padrão)
      - name: Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 3. Google Services JSON (Required for build)
      - name: Decode Google Services JSON
        run: |
          echo "${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      # Build Debug APK (Cheaper than Release build)
      - name: Build Android Debug APK
        run: |
          flutter build apk --debug
          echo "✅ Build Android concluído com sucesso"
